        <script>
            // Script robusto para eliminar Service Workers viejos que estén bloqueando la actualización
            // y asegurar que los usuarios siempre vean la versión más reciente sin tener que borrar caché.
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    let workersUnregistered = false;
                    for(let registration of registrations) {
                        registration.unregister();
                        workersUnregistered = true;
                        console.log('Service Worker antiguo eliminado.');
                    }
                    if (workersUnregistered) {
                        console.log('Recargando la página para aplicar los cambios...');
                        window.location.reload();
                    }
                }).catch(function(err) {
                    console.log('Error al procesar Service Workers: ', err);
                });
            }

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

        }
        map.createPane('pane_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3');
        map.getPane('pane_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3').style.zIndex = 402;
        map.getPane('pane_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3').style['mix-blend-mode'] = 'normal';
        var layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3 = new L.geoJson(json_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3',
            layerName: 'layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3',
            pane: 'pane_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3',
            onEachFeature: pop_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3,
            style: style_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3_0,
        });
        bounds_group.addLayer(layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3);
        map.addLayer(layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3);
        function pop_Zonasprohibidas_2(feature, layer) {
            var ubicacion = feature.properties['name'] ? autolinker.link(String(feature.properties['name']).replace(/'/g, '\'').toLocaleString()) : 'Área designada';
            var descripcion = feature.properties['description'] ? autolinker.link(String(feature.properties['description']).replace(/'/g, '\'').toLocaleString()) : 'Estacionamiento prohibido en esta área.';
            
            var center = layer.getBounds().getCenter();
            var svUrl = 'https://www.google.com/maps/search/?api=1&query=' + center.lat + ',' + center.lng;
            
            var svPt = center;
            var coords = layer.getLatLngs ? layer.getLatLngs() : null;
            if (coords && coords.length > 0) {
                var firstCoord = coords;
                while (Array.isArray(firstCoord) && firstCoord.length > 0) {
                    firstCoord = firstCoord[0];
                }
                if (firstCoord && firstCoord.lat !== undefined && firstCoord.lng !== undefined) {
                    svPt = firstCoord;
                }
            }
            var streetViewUrl = 'https://maps.google.com/maps?layer=c&cbll=' + svPt.lat + ',' + svPt.lng + '&cbp=11,0,0,0,0';

            var popupContent = '<div class="custom-popup">\
                    <h4>Zona Prohibida</h4>\
                    <p><strong>Ubicación:</strong> ' + ubicacion + '</p>\
                    <p>' + descripcion + '</p>\
                    <div style="display: flex; gap: 8px; margin-top: 12px;">\
                        <a href="' + svUrl + '" target="_blank" style="flex: 1; padding:8px 0; background-color:#c0392b; color:white; text-decoration:none; border-radius:6px; font-weight:600; font-size:13px; text-align:center;"><i class="fas fa-map-marker-alt" style="margin-right:5px;"></i>Maps</a>\
                        <a href="' + streetViewUrl + '" target="_blank" style="flex: 1; padding:8px 0; background-color:#34495e; color:white; text-decoration:none; border-radius:6px; font-weight:600; font-size:13px; text-align:center;"><i class="fas fa-street-view" style="margin-right:5px;"></i>Street View</a>\
                    </div>\
                </div>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Zonasprohibidas_2_0() {
            return {
                pane: 'pane_Zonasprohibidas_2',
                opacity: 1,
                color: '#c0392b',
                dashArray: '4, 4',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0, 
                fill: true,
                fillOpacity: 0.5,
                fillColor: '#e74c3c',
                interactive: true,
            }
        }
        map.createPane('pane_Zonasprohibidas_2');
        map.getPane('pane_Zonasprohibidas_2').style.zIndex = 403;
        map.getPane('pane_Zonasprohibidas_2').style['mix-blend-mode'] = 'normal';
        var layer_Zonasprohibidas_2 = new L.geoJson(json_Zonasprohibidas_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Zonasprohibidas_2',
            layerName: 'layer_Zonasprohibidas_2',
            pane: 'pane_Zonasprohibidas_2',
            onEachFeature: pop_Zonasprohibidas_2,
            style: style_Zonasprohibidas_2_0,
        });
        bounds_group.addLayer(layer_Zonasprohibidas_2);
        map.addLayer(layer_Zonasprohibidas_2);

        // Add Legend (Dashboard)
        var legend = L.control({position: 'bottomright'});

        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<h4>Referencias</h4>';
            
            // Carga y Descarga
            div.innerHTML += '<div class="legend-item"><i class="legend-color" style="background: rgba(243, 156, 18, 0.5); border: 2px solid #e67e22;"></i> Zona Carga y Descarga</div>';
            
            // Motos
            div.innerHTML += '<div class="legend-item"><i class="legend-color" style="background: rgba(52, 152, 219, 0.5); border: 2px solid #2980b9;"></i> Estacionamiento Motos</div>';
            
            // Zonas Prohibidas
            div.innerHTML += '<div class="legend-item"><i class="legend-color" style="background: rgba(231, 76, 60, 0.5); border: 2px dashed #c0392b;"></i> Zona Prohibida</div>';

            return div;
        };

        legend.addTo(map);

        // Nuevas capas base (Satélite)
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 398;
        var layer_GoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '&copy; <a href="https://www.google.com/intl/en_US/help/terms_maps.html">Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });

        map.createPane('pane_EsriSatellite_0');
        map.getPane('pane_EsriSatellite_0').style.zIndex = 399;
        var layer_EsriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_EsriSatellite_0',
            opacity: 1.0,
            attribution: 'Tiles &copy; Esri',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });

        // Control de Capas
        var baseMaps = {
            "Mapa Claro (CARTO)": layer_OSMStandard_0,
            "Google Satélite": layer_GoogleSatellite,
            "Esri Satélite": layer_EsriSatellite
        };

        var overlayMaps = {
            '<i class="fas fa-truck" style="color:#e67e22;"></i> Carga y Descarga': layer_CyD_Oficial_18x5_1,
            '<i class="fas fa-motorcycle" style="color:#2980b9;"></i> Estacionamiento Motos': layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3,
            '<i class="fas fa-ban" style="color:#c0392b;"></i> Zonas Prohibidas': layer_Zonasprohibidas_2
        };

        L.control.layers(baseMaps, overlayMaps, {position: 'topright', collapsed: false}).addTo(map);

        // ===== SISTEMA DE MENÚ LATERAL PREMIUM =====
        
        var _layerRegistry = {};
        var _layerIdCounter = 0;

        function toggleMenuPanel() {
            const panel = document.getElementById('menu-panel');
            const toggleBtn = document.getElementById('menu-toggle');
            if (panel) {
                panel.classList.toggle('hidden');
                if (toggleBtn) toggleBtn.classList.toggle('active');
            }
        }

        function extractNumber(name) {
            if (!name) return 999;
            var match = String(name).match(/\d+/);
            return match ? parseInt(match[0]) : 999;
        }

        function registerLayer(layer) {
            var id = 'lyr_' + (_layerIdCounter++);
            _layerRegistry[id] = layer;
            return id;
        }

        function populateMenu(filterText = '') {
            var menuContent = document.getElementById('menu-content');
            if (!menuContent) return;

            _layerRegistry = {};
            _layerIdCounter = 0;
            filterText = filterText.toLowerCase();

            var cydPoints = [];
            var motosPoints = [];

            // Procesar Carga y Descarga
            if (typeof layer_CyD_Oficial_18x5_1 !== 'undefined') {
                layer_CyD_Oficial_18x5_1.eachLayer(function(lyr) {
                    var nombre = lyr.feature.properties['Nombre'] || 'Zona CyD';
                    if (nombre.toLowerCase().includes(filterText)) {
                        cydPoints.push({
                            numero: extractNumber(nombre),
                            nombre: nombre,
                            layerId: registerLayer(lyr),
                            type: 'cyd'
                        });
                    }
                });
            }

            // Procesar Motos
            if (typeof layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3 !== 'undefined') {
                layer_Estacionamientodemotoshechoboxesmotos_oficiales_poligonos_3.eachLayer(function(lyr) {
                    var nombre = lyr.feature.properties['Nombre'] || lyr.feature.properties['Name'] || 'Moto';
                    if (nombre.toLowerCase().includes(filterText)) {
                        motosPoints.push({
                            numero: extractNumber(nombre),
                            nombre: nombre,
                            layerId: registerLayer(lyr),
                            type: 'motos'
                        });
                    }
                });
            }

            // Ordenar
            cydPoints.sort((a, b) => a.numero - b.numero);
            motosPoints.sort((a, b) => a.numero - b.numero);

            let html = '';

            if (cydPoints.length > 0) {
                html += '<div class="menu-section"><div class="menu-section-title">Carga y Descarga</div>';
                cydPoints.forEach(p => {
                    html += `
                        <div class="menu-item cyd" data-layerid="${p.layerId}">
                            <div class="menu-item-icon"><i class="fas fa-truck"></i></div>
                            <div class="menu-item-info">
                                <span class="menu-item-title">${p.nombre}</span>
                                <span class="menu-item-subtitle">Sector ${p.numero}</span>
                            </div>
                        </div>`;
                });
                html += '</div>';
            }

            if (motosPoints.length > 0) {
                html += '<div class="menu-section"><div class="menu-section-title">Estacionamiento Motos</div>';
                motosPoints.forEach(p => {
                    html += `
                        <div class="menu-item motos" data-layerid="${p.layerId}">
                            <div class="menu-item-icon"><i class="fas fa-motorcycle"></i></div>
                            <div class="menu-item-info">
                                <span class="menu-item-title">${p.nombre}</span>
                                <span class="menu-item-subtitle">Moto Sector ${p.numero}</span>
                            </div>
                        </div>`;
                });
                html += '</div>';
            }

            if (html === '') {
                html = '<div style="padding: 40px 20px; text-align: center; color: #95a5a6;">' +
                       '<i class="fas fa-search" style="font-size: 32px; margin-bottom: 10px; opacity: 0.3;"></i>' +
                       '<p>No se encontraron puntos</p></div>';
            }

            menuContent.innerHTML = html;

            // Eventos
            menuContent.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    var lyr = _layerRegistry[this.getAttribute('data-layerid')];
                    if (lyr) {
                        if (window.innerWidth < 768) toggleMenuPanel();
                        map.fitBounds(lyr.getBounds());
                        setTimeout(() => lyr.openPopup(), 400);
                    }
                });
            });
        }

        // Inicialización de eventos
        var menuToggle = document.getElementById('menu-toggle');
        if (menuToggle) menuToggle.addEventListener('click', toggleMenuPanel);
        
        var closeMenu = document.getElementById('close-menu');
        if (closeMenu) closeMenu.addEventListener('click', toggleMenuPanel);
        
        var searchInput = document.getElementById('menu-search-input');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                populateMenu(e.target.value);
            });
        }

        // Ejecutar población inicial cuando el mapa esté listo
        setTimeout(populateMenu, 1000);

        setBounds();
        </script>        
    </body>
</html>
